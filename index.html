<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseños Gaby | Home & Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        /* Navegación elegante */
        nav {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }

        .logo { 
            font-weight: 600; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            font-size: 1.2rem;
        }

        /* Banner Principal inspirado en tu imagen */
        .hero {
            position: relative;
            height: 85vh;
            background: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1200') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero-overlay {
            background: rgba(0, 0, 0, 0.3);
            padding: 60px;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hero h2 { 
            font-size: clamp(2rem, 5vw, 4rem); 
            margin: 0; 
            font-weight: 300; 
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .hero p {
            font-size: 1.2rem;
            margin: 20px 0;
            font-weight: 300;
        }

        /* Sección de Servicios/Productos */
        .section-title {
            text-align: center;
            padding: 80px 0 40px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #555;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(45%, 1fr));
            gap: 15px;
            padding: 0 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid-item {
            position: relative;
            height: 600px;
            overflow: hidden;
            background: #f9f9f9;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.15, 0, 0.05, 1);
        }

        .grid-item:hover img { 
            transform: scale(1.08); 
        }

        .item-info {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: white;
            z-index: 2;
        }

        .item-info h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 400;
        }

        /* Botones estilo minimalista */
        .btn-shop {
            display: inline-block;
            padding: 12px 30px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }

        .btn-shop:hover { 
            background: white; 
            color: black; 
        }

        /* Chat Flotante de Messenger (Visual) */
        .messenger-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0084FF;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,132,255,0.3);
            z-index: 2000;
            transition: transform 0.3s;
        }

        .messenger-float:hover {
            transform: scale(1.1);
        }

        .messenger-float svg {
            width: 30px;
            fill: white;
        }

        footer {
            padding: 100px 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            letter-spacing: 1px;
            border-top: 1px solid #eee;
            margin-top: 50px;
        }

        /* Responsivo para celulares */
        @media (max-width: 768px) {
            .grid-container { grid-template-columns: 1fr; }
            nav { padding: 20px; }
            .hero h2 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">Diseños Gaby</div>
    <div style="font-size: 0.8rem; letter-spacing: 1px;">COLECCIÓN 2026</div>
</nav>

<section class="hero">
    <div class="hero-overlay">
        <h2>Diseño & Hogar</h2>
        <p>Estética minimalista para marcas con propósito</p>
        <a href="https://m.me/TU_PAGINA_AQUI" class="btn-shop">Consultar catálogo</a>
    </div>
</section>

<h3 class="section-title">Categorías principales</h3>

<div class="grid-container">
    <div class="grid-item">
        <img src="https://images.unsplash.com/photo-1513519247388-4e2645d48d6d?auto=format&fit=crop&w=800" alt="Decoración">
        <div class="item-info">
            <h3>Identidad Visual</h3>
            <a href="https://m.me/TU_PAGINA_AQUI" class="btn-shop">Ver Proyectos</a>
        </div>
    </div>
    <div class="grid-item">
        <img src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&w=800" alt="Hogar">
        <div class="item-info">
            <h3>Diseño Social Media</h3>
            <a href="https://m.me/TU_PAGINA_AQUI" class="btn-shop">Saber más</a>
        </div>
    </div>
</div>

<a href="https://m.me/TU_PAGINA_AQUI" class="messenger-float" title="Chatea con nosotros">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.145 2 11.258c0 2.908 1.462 5.498 3.746 7.225V22l3.322-1.822c.903.25 1.86.386 2.85.386 5.523 0 10-4.145 10-9.258S17.523 2 12 2zm1.104 12.428l-2.583-2.753-5.043 2.753 5.545-5.889 2.653 2.753 4.973-2.753-5.545 5.889z"/></svg>
</a>

<footer>
    <p>&copy; 2026 DISEÑOS GABY. TODOS LOS DERECHOS RESERVADOS.</p>
</footer>

</body>
</html>
