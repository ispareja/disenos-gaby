<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseños Gaby | Home & Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #1a1a1a;
        }

        /* Navegación sutil */
        nav {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .logo { font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }

        /* Banner Principal estilo la imagen que mandaste */
        .hero {
            position: relative;
            height: 80vh;
            background: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1200') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero-overlay {
            background: rgba(0, 0, 0, 0.2);
            padding: 40px;
            border-radius: 8px;
        }

        .hero h2 { font-size: 3rem; margin: 0; font-weight: 300; }

        /* Sección de categorías/productos */
        .section-title {
            text-align: center;
            padding: 50px 0 20px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 10px;
            padding: 0 10px;
        }

        .grid-item {
            position: relative;
            height: 500px;
            overflow: hidden;
            background: #f4f4f4;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .grid-item:hover img { transform: scale(1.05); }

        .item-info {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .btn-shop {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-shop:hover { background: white; color: black; }

        footer {
            padding: 80px 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">Diseños Gaby</div>
    <div>Menú</div>
</nav>

<section class="hero">
    <div class="hero-overlay">
        <h2>Nueva Colección</h2>
        <p>Diseño que transforma espacios y marcas</p>
        <a href="https://wa.me/TU_NUMERO" class="btn-shop">Ver Catálogo</a>
    </div>
</section>

<h3 class="section-title">Nuestros Servicios</h3>

<div class="grid-container">
    <div class="grid-item">
        <img src="https://images.unsplash.com/photo-1513519247388-4e2645d48d6d?auto=format&fit=crop&w=600" alt="Decoración">
        <div class="item-info">
            <h3>Identidad de Marca</h3>
            <a href="#" class="btn-shop">Explorar</a>
        </div>
    </div>
    <div class="grid-item">
        <img src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&w=600" alt="Hogar">
        <div class="item-info">
            <h3>Diseño de Interiores</h3>
            <a href="#" class="btn-shop">Ver más</a>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Diseños Gaby. Estética y Funcionalidad.</p>
</footer>

</body>
</html>
