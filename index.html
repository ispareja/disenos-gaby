<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseños Gaby | Creatividad Visual</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #ff69b4; 
            --oscuro: #2d2d2d;
            --blanco: #ffffff;
        }
        body { font-family: 'Montserrat', sans-serif; margin: 0; color: var(--oscuro); line-height: 1.6; }
        header { background: var(--oscuro); color: var(--blanco); padding: 2rem; text-align: center; }
        .hero { padding: 4rem 2rem; text-align: center; background: #f9f9f9; }
        .btn-contacto { background: var(--primario); color: white; padding: 12px 25px; text-decoration: none; border-radius: 25px; font-weight: bold; display: inline-block; margin-top: 20px; }
        .portafolio { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .card { border: 1px solid #ddd; padding: 10px; text-align: center; border-radius: 10px; }
        .card img { width: 100%; border-radius: 5px; }
        footer { text-align: center; padding: 2rem; background: #eee; }
    </style>
</head>
<body>
<header>
    <h1>Diseños Gaby</h1>
    <p>Transformando ideas en arte visual</p>
</header>
<section class="hero">
    <h2>¡Hola! Soy Gaby</h2>
    <p>Especialista en diseño gráfico, logotipos y contenido para redes sociales.</p>
    <a href="https://wa.me/TU_NUMERO_AQUI" class="btn-contacto">Cotiza tu proyecto hoy</a>
</section>
<section class="portafolio">
    <div class="card"><img src="https://via.placeholder.com/300" alt="Diseño 1"><h3>Logotipos</h3></div>
    <div class="card"><img src="https://via.placeholder.com/300" alt="Diseño 2"><h3>Redes Sociales</h3></div>
    <div class="card"><img src="https://via.placeholder.com/300" alt="Diseño 3"><h3>Identidad Visual</h3></div>
</section>
<footer><p>&copy; 2026 Diseños Gaby - Todos los derechos reservados.</p></footer>
</body>
</html>
